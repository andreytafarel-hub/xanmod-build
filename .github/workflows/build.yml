name: XanMod_6.18_Final_Build
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc rsync kmod cpio rpm devscripts dwarves

      - name: Clone XanMod 6.18
        run: |
          # Клонируем напрямую с GitLab ветку 6.18
          git clone --depth 1 https://gitlab.com -b 6.18-xanmod kernel

      - name: Build RPM Packages
        run: |
          cd kernel
          make defconfig
          # Включаем оптимизацию v3 (специально для Skylake/i5-6200U)
          ./scripts/config --enable CONFIG_X86_64_VERSION_3
          # Отключаем лишнее для стабильности сборки
          ./scripts/config --disable CONFIG_MODULE_SIG
          ./scripts/config --disable CONFIG_DEBUG_INFO
          make olddefconfig
          # Сборка RPM (ядро, devel, headers) - это займет около 2 часов
          make binrpm-pkg -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XanMod-6.18-RPMs
          path: ~/rpmbuild/RPMS/x86_64/*.rpm
