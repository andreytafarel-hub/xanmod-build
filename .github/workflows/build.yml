name: XanMod_6.18_Final_Success
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc rsync kmod cpio rpm devscripts dwarves curl

      - name: Download Kernel (User-Agent Bypass)
        run: |
          # Имитируем браузер Chrome, чтобы GitLab не выдал 403 ошибку
          curl -L -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
          "https://gitlab.com" -o kernel.tar.gz
          
          # Проверяем, скачался ли архив или опять HTML-ошибка
          if file kernel.tar.gz | grep -q "gzip compressed"; then
            tar -xzf kernel.tar.gz
            mv linux-6.18.16-xanmod1 kernel
          else
            echo "Ошибка: Скачался не архив, а HTML-страница. Пробую запасной вариант (git clone)..."
            git clone --depth 1 https://gitlab.com -b 6.18-xanmod kernel
          fi

      - name: Build RPM Packages
        run: |
          cd kernel
          make defconfig
          # Оптимизация v3 для твоего i5-6200U (Skylake)
          ./scripts/config --enable CONFIG_X86_64_VERSION_3
          ./scripts/config --disable CONFIG_MODULE_SIG
          ./scripts/config --disable CONFIG_DEBUG_INFO
          make olddefconfig
          # Сборка RPM (займет около 2 часов)
          make binrpm-pkg -j$(nproc)

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: XanMod-6.18-Fedora43-RPMs
          path: ~/rpmbuild/RPMS/x86_64/*.rpm
