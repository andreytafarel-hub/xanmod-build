name: XanMod Build 6.18
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc rsync kmod cpio rpm devscripts

      - name: Clone XanMod
        run: |
          # Исправленная полная ссылка на репозиторий
          git clone --depth 1 https://github.com -b 6.18-xanmod kernel
          
      - name: Configure and Build
        run: |
          cd kernel
          make defconfig
          # Оптимизация под твой i5-6200U (v3)
          scripts/config --enable CONFIG_X86_64_VERSION_3
          make olddefconfig
          # Сборка RPM пакетов
          make binrpm-pkg -j$(nproc)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: XanMod-RPMs
          path: ~/rpmbuild/RPMS/x86_64/*.rpm
