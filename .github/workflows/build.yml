name: XanMod_Build_Final
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc rsync kmod cpio rpm devscripts dwarves curl

      - name: Download Kernel
        run: |
          # Используем curl с флагом -L (перенаправления) и -o (имя файла)
          curl -L "https://gitlab.com" -o kernel.tar.gz
          tar -xzf kernel.tar.gz
          # Переименовываем папку в 'kernel' для удобства
          mv linux-6.18.16-xanmod1 kernel

      - name: Build RPM
        run: |
          cd kernel
          make defconfig
          ./scripts/config --enable CONFIG_X86_64_VERSION_3
          ./scripts/config --disable CONFIG_MODULE_SIG
          ./scripts/config --disable CONFIG_DEBUG_INFO
          make olddefconfig
          make binrpm-pkg -j$(nproc)

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: XanMod-6.18.16-RPMs
          path: ~/rpmbuild/RPMS/x86_64/*.rpm
