name: XanMod_6.18.16_Final
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo rm -rf "/usr/local/share/boost"

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses-dev bison flex libssl-dev libelf-dev bc rsync kmod cpio rpm devscripts dwarves

      - name: Clone XanMod 6.18.16
        run: |
          # Клонируем именно ту ветку, что на твоем скрине
          git clone --depth 1 https://gitlab.com -b 6.18-xanmod kernel

      - name: Configure and Build RPM
        run: |
          cd kernel
          make defconfig
          # Оптимизация v3 для твоего процессора i5-6200U (Skylake)
          ./scripts/config --enable CONFIG_X86_64_VERSION_3
          # Отключаем лишнее для стабильной сборки в облаке
          ./scripts/config --disable CONFIG_MODULE_SIG
          ./scripts/config --disable CONFIG_DEBUG_INFO
          make olddefconfig
          # Сборка RPM пакетов (ядро, devel, headers)
          # Это займет примерно 2 часа
          make binrpm-pkg -j$(nproc)

      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: XanMod-6.18.16-RPMs
          path: ~/rpmbuild/RPMS/x86_64/*.rpm
